<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 상품명 자동 생성기</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    max-width: 1080px;
    margin: 0 auto;
    padding: 28px;
    background: #f8fafc;
    color: #0f172a;
  }
  .card {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 18px;
    padding: 22px;
    margin-bottom: 18px;
    box-shadow: 0 6px 20px rgba(15, 23, 42, 0.04);
  }
  h1 {
    margin: 0 0 8px;
    font-size: 28px;
  }
  .sub {
    margin: 0;
    color: #475569;
    line-height: 1.6;
  }
  .toolbar, .result-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 14px;
  }
  button {
    border: 0;
    border-radius: 12px;
    padding: 12px 18px;
    font-size: 15px;
    cursor: pointer;
    background: #111827;
    color: white;
  }
  button.secondary {
    background: #e2e8f0;
    color: #111827;
  }
  button.warn {
    background: #b91c1c;
  }
  button:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }
  textarea {
    width: 100%;
    min-height: 240px;
    resize: vertical;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid #cbd5e1;
    background: #fff;
    font-size: 14px;
    line-height: 1.6;
  }
  .helper {
    margin-top: 10px;
    color: #64748b;
    font-size: 13px;
    line-height: 1.6;
  }
  .status {
    margin-top: 12px;
    font-size: 14px;
    color: #334155;
  }
  .meta-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin-top: 14px;
  }
  .meta-box {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    padding: 14px;
  }
  .meta-title {
    font-size: 12px;
    color: #64748b;
    margin-bottom: 6px;
  }
  .meta-value {
    font-size: 20px;
    font-weight: 700;
  }
  .result-box {
    margin-top: 12px;
    white-space: pre-line;
    min-height: 260px;
    border: 1px solid #cbd5e1;
    border-radius: 14px;
    padding: 16px;
    background: #fff;
    line-height: 1.8;
  }
  .footer-note {
    font-size: 12px;
    color: #64748b;
    margin-top: 10px;
    line-height: 1.6;
  }
  @media (max-width: 860px) {
    .meta-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }
  @media (max-width: 560px) {
    body { padding: 16px; }
    .meta-grid {
      grid-template-columns: 1fr;
    }
    h1 { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="card">
  <h1>AI 상품명 자동 생성기</h1>
  <p class="sub">원상품명과 이미지URL을 한 줄에 하나씩 입력하면 상품별로 개별 생성합니다. 엑셀 붙여넣기에 맞게 줄바꿈으로 출력됩니다.</p>
</div>

<div class="card">
  <label for="input"><strong>입력</strong></label>
  <textarea id="input" placeholder="예시&#10;코코넛 화분 바질 재배 키트 | https://example.com/a.jpg&#10;초등 전기회로 실험 키트 | https://example.com/b.jpg&#10;정리 수납 바구니 손잡이형 | https://example.com/c.jpg"></textarea>
  <div class="helper">
    입력 형식: <strong>원상품명 | 이미지URL</strong><br />
    여러 줄 입력 가능 / 엑셀에서 복사 후 그대로 붙여넣기 가능
  </div>
  <div class="toolbar">
    <button id="generateBtn" onclick="generate()">상품명 생성</button>
    <button id="stopBtn" class="warn" onclick="stopGenerate()" disabled>생성 중지</button>
    <button class="secondary" onclick="clearInput()">입력 초기화</button>
  </div>
  <div id="status" class="status">대기중</div>
</div>

<div class="card">
  <strong>결과</strong>
  <div class="meta-grid">
    <div class="meta-box">
      <div class="meta-title">입력 상품 수</div>
      <div id="inputCount" class="meta-value">0</div>
    </div>
    <div class="meta-box">
      <div class="meta-title">생성 완료 수</div>
      <div id="doneCount" class="meta-value">0</div>
    </div>
    <div class="meta-box">
      <div class="meta-title">실패 수</div>
      <div id="failCount" class="meta-value">0</div>
    </div>
    <div class="meta-box">
      <div class="meta-title">결과 줄 수</div>
      <div id="resultCount" class="meta-value">0</div>
    </div>
  </div>

  <div id="result" class="result-box">대기중</div>

  <div class="result-toolbar">
    <button onclick="copyResult()">상품명 전체 복사</button>
    <button class="secondary" onclick="clearResult()">결과 초기화</button>
  </div>

  <div class="footer-note">
    결과는 상품명만 줄바꿈으로 출력됩니다. 복사 후 엑셀에 붙여넣으면 한 줄씩 아래 셀로 들어가도록 설계했습니다.
  </div>
</div>

function getByteLength(str) {
  let byte = 0;
  for (let i = 0; i < str.length; i++) {
    byte += str.charCodeAt(i) > 127 ? 2 : 1;
  }
  return byte;
}

function hasTripleWord(str) {
  const words = str.split(/\s+/).filter(Boolean);
  const count = {};
  for (const word of words) {
    count[word] = (count[word] || 0) + 1;
    if (count[word] >= 3) return true;
  }
  return false;
}

function cleanResult(content) {
  let cleaned = content || "";

  bannedWords.forEach(word => {
    const escapedWord = word.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const regex = new RegExp(escapedWord, "gi");
    cleaned = cleaned.replace(regex, "");
  });

  cleaned = cleaned
    .split("\n")
    .map(line =>
      line
        .trim()
        .replace(/1EA/gi, "")
        .replace(/1ea/gi, "")
        .replace(/1P/gi, "")
        .replace(/1p/gi, "")
        .replace(/1개/g, "")
        .replace(/한개/g, "")
        .replace(/단품/g, "")
        .replace(/낱개/g, "")
        .replace(/무료배송/g, "")
        .replace(/추천/g, "")
        .replace(/인기/g, "")
        .replace(/특가/g, "")
        .replace(/\s{2,}/g, " ")
        .trim()
    )
    .filter(Boolean)
    .filter(line => !hasTripleWord(line))
    .join("\n");

  return cleaned;
}

function setButtons(isGenerating) {
  document.getElementById("generateBtn").disabled = isGenerating;
  document.getElementById("stopBtn").disabled = !isGenerating;
}

function updateCounters(inputCount, doneCount, failCount, resultCount) {
  document.getElementById("inputCount").innerText = inputCount;
  document.getElementById("doneCount").innerText = doneCount;
  document.getElementById("failCount").innerText = failCount;
  document.getElementById("resultCount").innerText = resultCount;
}

function clearInput() {
  document.getElementById("input").value = "";
}

function clearResult() {
  document.getElementById("result").innerText = "대기중";
  document.getElementById("status").innerText = "대기중";
  updateCounters(0, 0, 0, 0);
}

function stopGenerate() {
  stopFlag = true;
  document.getElementById("status").innerText = "중지 요청됨";
}

async function generateSingle(line) {
  const prompt = `
아래 입력값 1개에 대해서만 상품명을 가공해줘.

중요 규칙
- 입력 1개당 출력도 반드시 1개만 한다
- 상품명만 출력한다
- 설명문 금지
- 타겟 키워드를 반드시 포함한다
- 사용 상황 키워드를 반드시 포함한다
- 핵심 키워드는 앞쪽에 배치한다
- 너무 일반적인 상품명이 되지 않게 한다
- 원상품명 단어를 그대로 재배열하지 않는다
- 상품명은 엑셀 LENB 기준 50바이트 이상 65바이트 이하를 목표로 한다
- 50바이트 미만이면 삭제하지 말고 보조 키워드를 추가해서 길이를 맞춘다
- 65바이트 초과면 삭제하지 말고 의미 약한 표현을 줄여서 길이를 맞춘다
- 같은 단어는 최대 2번까지만 허용한다
- 단일 상품일 경우 1EA 1ea 1P 1p 1개 한개 단품 낱개를 절대 넣지 않는다
- 최종 결과 1개를 반드시 출력한다

입력값
${line}
`;

  try {
    const response = await fetch("/api/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text: prompt })
    });

    const data = await response.json();

    if (!response.ok) {
      return { ok: false, text: "API에러" };
    }

    const content = data?.choices?.[0]?.message?.content || "";
    const cleaned = cleanResult(content);
    const firstLine = cleaned.split("\n").map(v => v.trim()).filter(Boolean)[0] || "";

    if (!firstLine) {
      return { ok: false, text: "생성실패" };
    }

    return { ok: true, text: firstLine };
} catch (error) {
  return { ok: false, text: "실행에러: " + (error?.message || String(error)) };
}
}

async function generate() {
  const input = document.getElementById("input").value.trim();
  const resultBox = document.getElementById("result");
  const statusBox = document.getElementById("status");

  if (!input) {
    resultBox.innerText = "입력값이 없습니다.";
    return;
  }

  stopFlag = false;
  setButtons(true);

  const lines = input.split("\n").map(v => v.trim()).filter(Boolean);
  const results = [];
  let doneCount = 0;
  let failCount = 0;

  updateCounters(lines.length, 0, 0, 0);
  resultBox.innerText = "생성 준비중...";

  for (let i = 0; i < lines.length; i++) {
    if (stopFlag) {
      statusBox.innerText = `생성이 중지되었습니다. ${doneCount}/${lines.length} 완료`;
      break;
    }

    statusBox.innerText = `생성 중... ${i + 1}/${lines.length}`;

    const result = await generateSingle(lines[i]);
    results.push(result.text);

    if (result.ok) doneCount += 1;
    else failCount += 1;

    resultBox.innerText = results.join("\n");
    updateCounters(lines.length, doneCount, failCount, results.length);
  }

  if (!stopFlag) {
    statusBox.innerText = `생성 완료. ${doneCount}/${lines.length} 성공`;
  }

  setButtons(false);
}

function copyResult() {
  const resultText = document.getElementById("result").innerText.trim();

  if (!resultText || resultText === "대기중") {
    alert("복사할 결과가 없습니다.");
    return;
  }

  navigator.clipboard.writeText(resultText)
    .then(() => alert("결과를 복사했습니다."))
    .catch(() => alert("복사에 실패했습니다."));
}
</script>
