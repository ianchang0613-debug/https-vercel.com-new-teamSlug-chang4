function cleanResult(content) {
  let cleaned = content;

  bannedWords.forEach(word => {
    const escapedWord = word.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const regex = new RegExp(escapedWord, "gi");
    cleaned = cleaned.replace(regex, "");
  });

  cleaned = cleaned
    .split("\n")
    .map(line => line.trim())
    .filter(Boolean)
    .map(line =>
      line
        .replace(/\b1EA\b/gi, "")
        .replace(/\b1P\b/gi, "")
        .replace(/\b1개\b/g, "")
        .replace(/\b한개\b/g, "")
        .replace(/\b단품\b/g, "")
        .replace(/\b낱개\b/g, "")
        .replace(/\b무료배송\b/g, "")
        .replace(/\b추천\b/g, "")
        .replace(/\b인기\b/g, "")
        .replace(/\b특가\b/g, "")
        .replace(/\s{2,}/g, " ")
        .trim()
   )
  .filter(line => {
    const byte = getByteLength(line);
    return byte >= 50 && byte <= 65;
  })
  .join("\n");

  return cleaned;
}

async function generate() {
  const input = document.getElementById("input").value.trim();
  const resultBox = document.getElementById("result");

  if (!input) {
    resultBox.innerText = "입력값이 없습니다.";
    return;
  }

  resultBox.innerText = "생성 중...";

  const prompt = `
아래 입력값을 기준으로 상품명을 가공해줘.

입력 형식
- 각 줄은 원상품명 | 이미지URL 형식이다
- 입력 순서를 유지해서 결과를 출력한다
- 출력은 가공된 상품명만 한 줄에 하나씩 줄바꿈으로 출력한다

입력값
${input}
`;

  try {
    const response = await fetch("/api/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text: prompt })
    });

    const data = await response.json();

    if (!response.ok) {
      resultBox.innerText = "에러: " + JSON.stringify(data);
      return;
    }

    const content = data?.choices?.[0]?.message?.content || "결과가 없습니다.";
    const cleaned = cleanResult(content);

    resultBox.innerText = cleaned;
  } catch (error) {
    resultBox.innerText = "실행 오류: " + error.message;
  }
}

function copyResult() {
  const resultText = document.getElementById("result").innerText.trim();

  if (!resultText) {
    alert("복사할 결과가 없습니다.");
    return;
  }

  navigator.clipboard.writeText(resultText)
    .then(() => {
      alert("결과를 복사했습니다.");
    })
    .catch(() => {
      alert("복사에 실패했습니다.");
    });
}
