<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI 상품명 자동 생성기</title>
<style>
body {
  font-family: Arial, sans-serif;
  max-width: 900px;
  margin: auto;
  padding: 30px;
}
textarea {
  width: 100%;
  height: 220px;
}
button {
  padding: 10px 20px;
  font-size: 16px;
  margin-top: 10px;
  margin-right: 10px;
}
#result {
  margin-top: 20px;
  white-space: pre-line;
  border: 1px solid #ddd;
  padding: 15px;
  min-height: 120px;
}
</style>
</head>
<body>

<h2>AI 상품명 자동 생성기</h2>
<p>원상품명 | 이미지URL 형식으로 입력</p>

<textarea id="input" placeholder="상품명 | 이미지URL 형식으로 여러 줄 입력"></textarea>
<br>
<button onclick="generate()">상품명 생성</button>
<button onclick="copyResult()">복사</button>

<div id="result">대기중</div>

<script>
async function generate() {
  const input = document.getElementById("input").value.trim();
  const resultBox = document.getElementById("result");

  resultBox.innerText = "버튼 클릭됨";

  if (!input) {
    resultBox.innerText = "입력값이 없습니다.";
    return;
  }

  const lines = input.split("\n").map(v => v.trim()).filter(Boolean);
  const results = [];

  for (let i = 0; i < lines.length; i++) {
    resultBox.innerText = `생성 중... ${i + 1}/${lines.length}`;

    const prompt = `
아래 입력값 1개에 대해서만 상품명을 가공해줘.

규칙
- 입력 1개당 출력 1개
- 상품명만 출력
- 설명문 금지

입력값
${lines[i]}
`;

    try {
      const response = await fetch("/api/generate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text: prompt })
      });

      const data = await response.json();

      if (!response.ok) {
        results.push("API에러: " + JSON.stringify(data));
        continue;
      }

      const content = data?.choices?.[0]?.message?.content || "결과없음";
      results.push(content.trim());
    } catch (error) {
      results.push("실행에러: " + error.message);
    }
  }

  resultBox.innerText = results.join("\n");
}

function copyResult() {
  const resultText = document.getElementById("result").innerText.trim();

  if (!resultText) {
    alert("복사할 결과가 없습니다.");
    return;
  }

  navigator.clipboard.writeText(resultText)
    .then(() => alert("결과를 복사했습니다."))
    .catch(() => alert("복사에 실패했습니다."));
}
</script>

</body>
</html>
