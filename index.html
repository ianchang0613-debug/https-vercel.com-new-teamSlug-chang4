function hasTripleWord(str) {
  const words = str.split(/\s+/).filter(Boolean);
  const count = {};

  for (let word of words) {
    count[word] = (count[word] || 0) + 1;
    if (count[word] >= 3) {
      return true;
    }
  }

  return false;
}

function getByteLength(str) {
  let byte = 0;
  for (let i = 0; i < str.length; i++) {
    byte += str.charCodeAt(i) > 127 ? 2 : 1;
  }
  return byte;
}

function cleanResult(content) {
  let cleaned = content;

  bannedWords.forEach(word => {
    const escapedWord = word.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const regex = new RegExp(escapedWord, "gi");
    cleaned = cleaned.replace(regex, "");
  });

  cleaned = cleaned
    .split("\n")
    .map(line =>
      line
        .trim()
        .replace(/1EA/gi, "")
        .replace(/1ea/gi, "")
        .replace(/1P/gi, "")
        .replace(/1p/gi, "")
        .replace(/1개/g, "")
        .replace(/한개/g, "")
        .replace(/단품/g, "")
        .replace(/낱개/g, "")
        .replace(/무료배송/g, "")
        .replace(/추천/g, "")
        .replace(/인기/g, "")
        .replace(/특가/g, "")
        .replace(/\s{2,}/g, " ")
        .trim()
    )
    .filter(Boolean)
    .filter(line => !hasTripleWord(line))
    .join("\n");

  return cleaned;
}

async function generateSingle(line) {
  const prompt = `
아래 입력값 1개에 대해서만 상품명을 가공해줘.

중요 규칙
- 입력 1개당 출력도 반드시 1개만 한다
- 상품명만 출력한다
- 설명문 금지
- 입력값과 동일하거나 지나치게 유사한 표현 금지
- 타겟 키워드 포함
- 사용 상황 키워드 포함
- 같은 단어 3번 이상 금지
- 상품명은 엑셀 LENB 기준 50바이트 이상 65바이트 이하
- 조건을 만족하지 못하면 삭제하지 말고 다시 작성한다
- 단일 상품일 경우 1EA 1ea 1P 1p 1개 한개 단품 낱개를 절대 넣지 않는다
- 최종 결과 1개를 반드시 출력한다

입력값
${line}
`;

  try {
    const response = await fetch("/api/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text: prompt })
    });

    const data = await response.json();

    if (!response.ok) {
      return "API에러";
    }

    const content = data?.choices?.[0]?.message?.content || "";
    const cleaned = cleanResult(content);
    const firstLine = cleaned.split("\n").map(v => v.trim()).filter(Boolean)[0] || "";

    return firstLine || "생성실패";
  } catch (error) {
    return "실행에러";
  }
}

async function generate() {
  const input = document.getElementById("input").value.trim();
  const resultBox = document.getElementById("result");

  if (!input) {
    resultBox.innerText = "입력값이 없습니다.";
    return;
  }

  const lines = input.split("\n").map(v => v.trim()).filter(Boolean);
  const results = [];

  for (let i = 0; i < lines.length; i++) {
    resultBox.innerText = `생성 중... ${i + 1}/${lines.length}`;
    const result = await generateSingle(lines[i]);
    results.push(result);
  }

  resultBox.innerText = results.join("\n");
}

function copyResult() {
  const resultText = document.getElementById("result").innerText.trim();

  if (!resultText) {
    alert("복사할 결과가 없습니다.");
    return;
  }

  navigator.clipboard.writeText(resultText)
    .then(() => alert("결과를 복사했습니다."))
    .catch(() => alert("복사에 실패했습니다."));
}
