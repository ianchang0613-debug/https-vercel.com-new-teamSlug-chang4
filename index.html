<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 상품명 자동 생성기</title>
<style>
body {
  font-family: Arial, sans-serif;
  max-width: 1080px;
  margin: 0 auto;
  padding: 28px;
  background: #f8fafc;
  color: #0f172a;
}
.card {
  background: #ffffff;
  border: 1px solid #e2e8f0;
  border-radius: 18px;
  padding: 22px;
  margin-bottom: 18px;
}
h1 {
  margin: 0 0 8px;
  font-size: 28px;
}
.sub {
  margin: 0;
  color: #475569;
  line-height: 1.6;
}
textarea {
  width: 100%;
  min-height: 220px;
  resize: vertical;
  padding: 14px;
  border-radius: 14px;
  border: 1px solid #cbd5e1;
  background: #fff;
  font-size: 14px;
  line-height: 1.6;
  box-sizing: border-box;
}
button {
  border: 0;
  border-radius: 12px;
  padding: 12px 18px;
  font-size: 15px;
  cursor: pointer;
  background: #111827;
  color: white;
  margin-top: 10px;
  margin-right: 10px;
}
button.secondary {
  background: #e2e8f0;
  color: #111827;
}
button.warn {
  background: #b91c1c;
}
button:disabled {
  opacity: 0.55;
  cursor: not-allowed;
}
#result {
  margin-top: 16px;
  white-space: pre-line;
  min-height: 220px;
  border: 1px solid #cbd5e1;
  border-radius: 14px;
  padding: 16px;
  background: #fff;
  line-height: 1.8;
}
.status {
  margin-top: 12px;
  font-size: 14px;
  color: #334155;
}
.helper {
  margin-top: 10px;
  color: #64748b;
  font-size: 13px;
  line-height: 1.6;
}
.meta {
  margin-top: 12px;
  color: #475569;
  font-size: 14px;
}
</style>
</head>
<body>

<div class="card">
  <h1>AI 상품명 자동 생성기</h1>
  <p class="sub">원상품명과 이미지URL을 한 줄에 하나씩 입력하면 상품별로 개별 생성합니다.</p>
</div>

<div class="card">
  <textarea id="input" placeholder="예시&#10;코코넛 화분 바질 재배 키트 | https://example.com/a.jpg&#10;초등 전기회로 실험 키트 | https://example.com/b.jpg"></textarea>

  <div class="helper">
    입력 형식: <strong>원상품명 | 이미지URL</strong><br />
    여러 줄 입력 가능 / 엑셀에서 복사 후 그대로 붙여넣기 가능
  </div>

  <button id="generateBtn" onclick="generate()">상품명 생성</button>
  <button id="stopBtn" class="warn" onclick="stopGenerate()" disabled>생성 중지</button>
  <button class="secondary" onclick="clearInput()">입력 초기화</button>

  <div id="status" class="status">대기중</div>
  <div id="meta" class="meta">입력 0개 / 완료 0개 / 실패 0개</div>
</div>

<div class="card">
  <div id="result">대기중</div>
  <button onclick="copyResult()">상품명 전체 복사</button>
  <button class="secondary" onclick="clearResult()">결과 초기화</button>
</div>

<script>
let stopFlag = false;

function setButtons(isGenerating) {
  document.getElementById("generateBtn").disabled = isGenerating;
  document.getElementById("stopBtn").disabled = !isGenerating;
}

function clearInput() {
  document.getElementById("input").value = "";
}

function clearResult() {
  document.getElementById("result").innerText = "대기중";
  document.getElementById("status").innerText = "대기중";
  document.getElementById("meta").innerText = "입력 0개 / 완료 0개 / 실패 0개";
}

function stopGenerate() {
  stopFlag = true;
  document.getElementById("status").innerText = "중지 요청됨";
}

function cleanResult(text) {
  return (text || "")
    .replace(/1EA/gi, "")
    .replace(/1ea/gi, "")
    .replace(/1P/gi, "")
    .replace(/1p/gi, "")
    .replace(/1개/g, "")
    .replace(/한개/g, "")
    .replace(/단품/g, "")
    .replace(/낱개/g, "")
    .replace(/\s{2,}/g, " ")
    .trim();
}

async function generateSingle(line) {
  const prompt = `
아래 입력값 1개에 대해서만 상품명을 가공해줘.

규칙
- 입력 1개당 출력도 1개
- 상품명만 출력
- 설명문 금지
- 타겟 키워드 포함
- 사용 상황 키워드 포함
- 너무 일반적이지 않게 작성
- 단일 상품이면 1EA 1ea 1P 1p 1개 한개 단품 낱개 금지

입력값
${line}
`;

  try {
    const response = await fetch("/api/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text: prompt })
    });

    const raw = await response.text();

    let data;
    try {
      data = JSON.parse(raw);
    } catch (e) {
      data = raw;
    }

    if (!response.ok) {
      return { ok: false, text: "API에러: " + (typeof data === "string" ? data : JSON.stringify(data)) };
    }

    const content = typeof data === "string"
      ? data
      : (data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || "";

    const cleaned = cleanResult(content);
    return { ok: true, text: cleaned || "생성실패" };
  } catch (error) {
    return { ok: false, text: "실행에러: " + (error && error.message ? error.message : String(error)) };
  }
}

async function generate() {
  const input = document.getElementById("input").value.trim();
  const resultBox = document.getElementById("result");
  const statusBox = document.getElementById("status");
  const metaBox = document.getElementById("meta");

  if (!input) {
    resultBox.innerText = "입력값이 없습니다.";
    return;
  }

  stopFlag = false;
  setButtons(true);

  const lines = input.split("\n").map(function(v) { return v.trim(); }).filter(function(v) { return v; });
  const results = [];
  let doneCount = 0;
  let failCount = 0;

  resultBox.innerText = "생성 준비중...";
  metaBox.innerText = "입력 " + lines.length + "개 / 완료 0개 / 실패 0개";

  for (let i = 0; i < lines.length; i++) {
    if (stopFlag) {
      statusBox.innerText = "생성이 중지되었습니다.";
      break;
    }

    statusBox.innerText = "생성 중... " + (i + 1) + "/" + lines.length;

    const result = await generateSingle(lines[i]);
    results.push(result.text);

    if (result.ok) doneCount++;
    else failCount++;

    resultBox.innerText = results.join("\n");
    metaBox.innerText = "입력 " + lines.length + "개 / 완료 " + doneCount + "개 / 실패 " + failCount + "개";
  }

  if (!stopFlag) {
    statusBox.innerText = "생성 완료";
  }

  setButtons(false);
}

function copyResult() {
  const resultText = document.getElementById("result").innerText.trim();

  if (!resultText || resultText === "대기중") {
    alert("복사할 결과가 없습니다.");
    return;
  }

  navigator.clipboard.writeText(resultText)
    .then(function() {
      alert("결과를 복사했습니다.");
    })
    .catch(function() {
      alert("복사에 실패했습니다.");
    });
}
</script>

</body>
</html>
