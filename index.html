<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI 상품명 자동 생성기</title>
<style>
body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:30px;
}
textarea{
width:100%;
height:200px;
}
button{
padding:10px 20px;
font-size:16px;
margin-top:10px;
}
#result{
margin-top:20px;
white-space:pre-line;
border:1px solid #ddd;
padding:15px;
}
</style>
</head>

<body>

<h2>AI 상품명 자동 생성기</h2>

<p>원상품명 | 이미지URL 형식으로 입력</p>
<p>엑셀에서 복사해서 붙여넣기 가능 (상품명 | 이미지URL)</p>
<textarea id="input" placeholder="상품명 | 이미지URL 형식으로 여러 줄 입력"></textarea>

<br>

<button onclick="generate()">상품명 생성</button>

<div id="result"></div>

<script>
async function generate() {
  const input = document.getElementById("input").value.trim();
  const resultBox = document.getElementById("result");

  if (!input) {
    resultBox.innerText = "입력값이 없습니다.";
    return;
  }

  resultBox.innerText = "생성 중...";

  const prompt = `
아래 입력값을 기준으로 상품명을 가공해줘.

입력 형식
- 각 줄은 원상품명 | 이미지URL 형식이다
- 입력 순서를 유지해서 결과를 출력한다
- 출력은 가공된 상품명만 한 줄에 하나씩 줄바꿈으로 출력한다

입력값
${input}
`;

  try {
    const response = await fetch("/api/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text: prompt })
    });

    const data = await response.json();

    if (!response.ok) {
      resultBox.innerText = "에러: " + JSON.stringify(data);
      return;
    }

 const content = data?.choices?.[0]?.message?.content || "결과가 없습니다.";

const cleaned = content
  .split("\n")
  .map(line => line.trim())
  .filter(Boolean)
  .map(line =>
    line
      .replace(/\b1EA\b/gi, "")
      .replace(/\b1P\b/gi, "")
      .replace(/\b1개\b/g, "")
      .replace(/\b한개\b/g, "")
      .replace(/\b단품\b/g, "")
      .replace(/\b낱개\b/g, "")
      .replace(/\b무료배송\b/g, "")
      .replace(/\b추천\b/g, "")
      .replace(/\b인기\b/g, "")
      .replace(/\b특가\b/g, "")
      .replace(/\s{2,}/g, " ")
      .trim()
  )
  .join("\n");

resultBox.innerText = cleaned;
  } catch (error) {
    resultBox.innerText = "실행 오류: " + error.message;
  }
}
</script>
