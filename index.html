<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI 상품명 자동 생성기</title>
<style>
body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:30px;
}
textarea{
width:100%;
height:200px;
}
button{
padding:10px 20px;
font-size:16px;
margin-top:10px;
}
#result{
margin-top:20px;
white-space:pre-line;
border:1px solid #ddd;
padding:15px;
}
</style>
</head>

<body>

<h2>AI 상품명 자동 생성기</h2>

<p>원상품명 | 이미지URL 형식으로 입력</p>
<p>엑셀에서 복사해서 붙여넣기 가능 (상품명 | 이미지URL)</p>
<textarea id="input" placeholder="상품명 | 이미지URL 형식으로 여러 줄 입력"></textarea>

<br>

<button onclick="generate()">상품명 생성</button>

<div id="result"></div>

<script>

async function generate(){

const apiKey = process.env.OPENAI_API_KEY;

const input = document.getElementById("input").value;

const prompt = `
다음 상품들의 상품명을 가공해줘.
출력은 상품명만 줄바꿈으로 출력한다.

${input}
`;

const response = await fetch("/api/generate",{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

model:"gpt-4o-mini",

messages:[
{role:"system",content:"너는 상품명 가공 전문가다"},
{role:"user",content:prompt}
]

})

});

const data = await response.json();

document.getElementById("result").innerText =
data.choices[0].message.content;

}

</script>

</body>
</html>
